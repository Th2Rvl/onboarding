<div class="page">
    <section>
        <app-form [config]="formConfig" [style.width.px]="400" (formSubmit)="addTeam($event)"/>
    </section>
    <section>    
        <p-table [value]="teams" selectionMode="single" (onRowSelect)="onRowSelect($event)">
            <ng-template #header>
                <tr>
                    <th>Nom</th>
                </tr>
            </ng-template>
            <ng-template #body let-team>
                <tr [pSelectableRow]="team">
                    <td>{{ team.nom }}</td>
                </tr>
            </ng-template>
        </p-table>
    </section>    
</div>
